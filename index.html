<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Serviços · MT1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3d;
      --accent:    #4f6ef7;
      --accent-hl: #7b93ff;
      --text:      #e8eaf2;
      --muted:     #7a7f9a;
      --danger:    #e05c6a;
      --radius:    12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
    }

    .login-card .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent-hl);
      margin-bottom: 8px;
    }

    .login-card h1 {
      font-family: 'Sora', sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 6px;
      color: #fff;
    }

    .login-card .subtitle {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      font-family: 'Inter', sans-serif;
    }
    input[type="password"]::placeholder { color: var(--muted); }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-login {
      margin-top: 20px;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .2s, transform .1s;
    }
    .btn-login:hover  { background: var(--accent-hl); }
    .btn-login:active { transform: scale(.98); }

    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      min-height: 20px;
      transition: opacity .2s;
    }

    /* ── DASHBOARD ── */
    #dashboard-screen {
      display: none;
      flex-direction: column;
      flex: 1;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    header .brand-name {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    header .brand-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color .2s, border-color .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--muted); }

    .iframe-wrap {
      flex: 1;
      padding: 0;
      overflow: hidden;
    }

    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <p class="eyebrow">MT1 · Comercial</p>
      <h1>Painel de<br>Serviços</h1>
      <p class="subtitle">Acesso restrito à equipe autorizada.</p>

      <label for="senha">Senha de acesso</label>
      <input type="password" id="senha" placeholder="••••••••••" autocomplete="current-password"/>

      <button class="btn-login" onclick="entrar()">Entrar</button>
      <p class="error-msg" id="erro"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen">
    <header>
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-name">Painel de Serviços</div>
          <div class="brand-sub">MT1 · Acompanhamento</div>
        </div>
      </div>
      <button class="btn-logout" onclick="sair()">Sair</button>
    </header>

    <div class="iframe-wrap">
      <iframe
        id="pbi-frame"
        title="[MT1] - Painel de Serviços 1 - acompanhamento"
        allowfullscreen="true"
        src="">
      </iframe>
    </div>
  </div>

  <script>
    const SENHA_CORRETA = 'comercialmt1';
    const PBI_URL = 'https://app.powerbi.com/view?r=eyJrIjoiZmQ4YzM4OTUtZjAzNS00NGFhLWI1Y2MtYWMzZTNiN2IwZDRmIiwidCI6IjNhZDRhYjQ1LTg4YmQtNGMyYi05YmRhLWFmMzBiODM0ZDI0MCJ9';

    function entrar() {
      const valor = document.getElementById('senha').value;
      const erro  = document.getElementById('erro');

      if (valor === SENHA_CORRETA) {
        sessionStorage.setItem('mt1_auth', '1');
        mostrarDashboard();
      } else {
        erro.textContent = 'Senha incorreta. Tente novamente.';
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
      }
    }

    function mostrarDashboard() {
      document.getElementById('login-screen').style.display    = 'none';
      document.getElementById('dashboard-screen').style.display = 'flex';
      document.getElementById('pbi-frame').src = PBI_URL;
    }

    function sair() {
      sessionStorage.removeItem('mt1_auth');
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('login-screen').style.display     = 'flex';
      document.getElementById('pbi-frame').src = '';
      document.getElementById('senha').value   = '';
      document.getElementById('erro').textContent = '';
    }

    // Mantém sessão enquanto a aba estiver aberta
    if (sessionStorage.getItem('mt1_auth') === '1') mostrarDashboard();

    // Enter para logar
    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') entrar();
    });
  </script>
</body>
</html>
